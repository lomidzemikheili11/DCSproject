<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <script src="script.js"></script>

    <header>
        <a href="de.html"><img src="images-removebg-preview.png" alt="logo"></a>
        <div class="header">
            <nav>
                <a href="login.html"><img src="lang-en.png" alt="UK-flag"></a>
                <a href="loginru.html"><img src="lang-ru.png" alt="RU-flag"></a>
                <a href="loginde.html"><img src="lang-de.png" alt="DE-flag"></a>
                <a href="loginfr.html"><img src="lang-fr.png" alt="FR-flag"></a>
                <a href="loginit.html"><img src="lang-it.png" alt="IT-flag"></a>
            </nav>
        </div>
    </header>
    <div class="search">
        <div class="hamburger">
            <input class="checkbox" type="checkbox" id="burgerToggle" />
            <svg fill="none" viewBox="0 0 50 50" height="50" width="50">
                <path class="lineTop line" stroke-linecap="round" stroke-width="4" stroke="black" d="M6 11L44 11">
                </path>
                <path stroke-linecap="round" stroke-width="4" stroke="black" d="M6 24H43" class="lineMid line">
                </path>
                <path stroke-linecap="round" stroke-width="4" stroke="black" d="M6 37H43" class="lineBottom line">
                </path>
            </svg>
        </div>
        <div class="HOME">
            <a class="A" href="de.html">Startseite</a>
            <a class="B" href="downloadde.html">Downloads</a>
            <a class="C" href="supportDE.html">Support</a>
            <a class="D" href="plane-cardsDE.html">Flugzeugkarten</a>

        </div>
    </div>

    <div class="login-wrapper">
        <form class="login-box">
            <h2>Anmeldung</h2>
            <div class="text">
                <div class="input-field">
                    <input type="email" id="loginEmail" required> <label>E-Mail-Adresse</label>
                </div>

                <div class="input-field">
                    <input type="password" id="loginPassword" required>
                    <label>Passwort</label>
                </div>
            </div>

            <button type="submit">Anmelden</button>

            <div class="account">
                <h4>Noch kein Konto?</h4>
                <a href="registrationde.html">Registrieren</a>
            </div>
        </form>
    </div>

    <script src="login.js"></script>

</body>

</html>
