<!DOCTYPE html>

<head>

<body>
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard - DCS Project</title>
        <link rel="stylesheet" href="admin-dashboard.css">
    </head>

    <body>
        <div id="adminLogin" class="login-container">
            <div class="login-box">
                <h2>DCS Admin Login</h2>

                <input type="password" id="adminLoginPassword" placeholder="Enter Admin Password">

                <button onclick="checkAdminPassword()">Login</button>

                <p id="loginError"></p>
            </div>
        </div>

        <div class="admin-container" id="adminPanel" style="display:none;">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>Admin Panel</h1>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="#dashboard" class="nav-link active"
                                onclick="showSection('dashboard', event)">Dashboard</a></li>

                        <li>
                            <a href="#planes-management" class="nav-link"
                                onclick="showSection('planes-management', event)">plane Cards</a>
                        </li>

                        <li><a href="#settings" class="nav-link" onclick="showSection('settings', event)">Settings</a>
                        </li>

                    </ul>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Dashboard Section -->
                <section id="dashboard" class="section active">
                    <div class="section-header">
                        <h2>Dashboard</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Active Sessions</h3>
                            <p class="stat-number" id="activeSessions">0</p>
                        </div>
                    </div>
                </section>

                <section id="planes-management" class="section">
                    <div class="section-header"
                        style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                        <h2 style="color: #000000;">Plane Management</h2>
                        <button class="btn btn-success" onclick="openPlaneModal()">+ Add New Plane</button>
                    </div>

                    <div class="table-container"
                        style="background: #fff; border-radius: 8px; overflow: hidden; margin: 0 20px;">
                        <table class="admin-table" style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                                    <th style="padding: 15px; text-align: left; color: #333;">Photo</th>
                                    <th style="padding: 15px; text-align: left; color: #333;">Name</th>
                                    <th style="padding: 15px; text-align: left; color: #333;">Type</th>
                                    <th style="padding: 15px; text-align: left; color: #333;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="apiPlanesTable">
                            </tbody>
                        </table>
                    </div>
                </section>

                <div id="planeModal" class="admin-modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>Aircraft Details</h3>
                            <span class="close-modal" onclick="closePlaneModal()">&times;</span>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label>Aircraft Name:</label>
                                <input type="text" id="pName" placeholder="მაგ: F-16C Viper">
                            </div>
                            <div class="form-group">
                                <label>Image URL:</label>
                                <input type="text" id="pImage" placeholder="https://link-to-image.jpg">
                            </div>
                            <div class="form-group">
                                <label>Type:</label>
                                <select id="pType">
                                    <option value="Fighter">Fighter</option>
                                    <option value="Striker">Striker</option>
                                    <option value="Helicopter">Helicopter</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Bomber">Bomber</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Description:</label>
                                <textarea id="pDesc" rows="4" placeholder="მოკლე აღწერა..."></textarea>
                            </div>
                            <button class="btn-save" onclick="savePlane()">Save Aircraft</button>
                        </div>
                    </div>
                </div>


                <!-- Settings Section -->
                <section id="settings" class="section">
                    <div class="settings-container">
                        <div class="section-header">
                            <h2>Settings</h2>
                        </div>
                        <div class="settings-group">
                            <h3>Admin Panel Settings</h3>
                            <div class="form-group">
                                <label for="siteName">Site Name:</label>
                                <input type="text" id="siteName" value="DCS Project">
                            </div>
                            <div class="form-group">
                                <label for="adminEmail">Admin Email:</label>
                                <input type="email" id="adminEmail" value="admin@dcsproject.com">
                            </div>
                            <button class="btn btn-success" onclick="saveSettings()">Save Settings</button>
                        </div>
                        <div class="setting-item">
                            <label>Change Admin Password</label>
                            <input type="password" id="newAdminPassword" placeholder="New Password">
                            <button onclick="changePassword()">Change Password</button>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <script src="admin-dashboard.js"></script>
    </body>

    </html>
</body>

</html>
