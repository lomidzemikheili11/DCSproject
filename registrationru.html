<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="registration.css">
</head>

<body>

    <script src="script.js"></script>

    <header>
        <a href="ru.html"><img src="images-removebg-preview.png" alt="logo"></a>
        <div class="header">
            <nav>
                <a href="registration.html"><img src="lang-en.png" alt="UK-flag"></a>
                <a href="registrationru.html"><img src="lang-ru.png" alt="RU-flag"></a>
                <a href="registrationde.html"><img src="lang-de.png" alt="DE-flag"></a>
                <a href="registrationfr.html"><img src="lang-fr.png" alt="FR-flag"></a>
                <a href="registrationit.html"><img src="lang-it.png" alt="IT-flag"></a>
            </nav>
        </div>
    </header>
    <div class="search">
        <div class="hamburger">
            <input class="checkbox" type="checkbox" id="burgerToggle" />
            <svg fill="none" viewBox="0 0 50 50" height="50" width="50">
                <path class="lineTop line" stroke-linecap="round" stroke-width="4" stroke="black" d="M6 11L44 11">
                </path>
                <path stroke-linecap="round" stroke-width="4" stroke="black" d="M6 24H43" class="lineMid line">
                </path>
                <path stroke-linecap="round" stroke-width="4" stroke="black" d="M6 37H43" class="lineBottom line">
                </path>
            </svg>
        </div>
        <div class="HOME">
            <a class="A" href="ru.html">Главная</a>
            <a class="B" href="downloadru.html">Скачать</a>
            <a class="C" href="supportRU.html">Поддержка</a>
            <a class="D" href="plane-cardsRU.html">Карты самолетов</a>
        </div>
    </div>

    <div class="register-wrapper">
        <form class="register-box">
            <h2>Создать аккаунт</h2>
            <div class="name">
                <div class="input-field">
                    <input type="text" id="firstName" required>
                    <label>Имя</label>
                </div>
                <div class="input-field">
                    <input type="text" id="lastName" required>
                    <label>Фамилия</label>
                </div>
            </div>

            <div class="input-field">
                <input type="email" id="email" required>
                <label>Электронная почта</label>
            </div>

            <div class="name">
                <div class="input-field">
                    <input type="number" id="age" required min="13">
                    <label>Возраст</label>
                </div>
                <div class="input-field">
                    <select id="gender" required
                        style="width: 100%; height: 100%; background: #fafafa00; border-radius: 6px; border: 1px solid rgb(197, 197, 197); color: grey; padding: 10px;">
                        <option value="MALE">Мужской</option>
                        <option value="FEMALE">Женский</option>
                    </select>
                </div>
            </div>

            <div class="input-field">
                <input type="text" id="address" required>
                <label>Адрес</label>
            </div>

            <div class="name">
                <div class="input-field">
                    <input type="text" id="phone" required>
                    <label>Номер телефона</label>
                </div>
                <div class="input-field">
                    <input type="text" id="zipcode" required>
                    <label>Почтовый индекс</label>
                </div>
            </div>

            <div class="input-field">
                <input type="url" id="avatar" placeholder="https://...">
                <label>Ссылка на аватар</label>
            </div>

            <div class="password">
                <div class="input-field">
                    <input type="password" id="password" required minlength="8">
                    <label>Пароль *</label>
                </div>
                <div class="input-field">
                    <input type="password" id="confirmPassword" required minlength="8">
                    <label>Подтвердите пароль *</label>
                </div>
            </div>

            <button type="submit">Зарегистрироваться</button>

            <div class="account">
                <h4>У вас уже есть аккаунт?</h4>
                <a href="loginru.html">Авторизоваться</a>
            </div>
        </form>
    </div>
    <script src="registration.js"></script>

</body>

</html>
